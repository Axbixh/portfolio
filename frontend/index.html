<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0705" />
  <title>The Observatory — Portfolio</title>
  <meta name="description" content="Building things worth paying attention to — through film, design and whatever the idea demands." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="The Observatory" />
  <meta property="og:description" content="A spatial portfolio with a real-time cinematography light room. Building things worth paying attention to." />
  <meta property="og:image" content="/og.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='13' fill='none' stroke='%23e0a96e' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='4' fill='%23f5c542'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- WebGL canvas mounts here (decorative to assistive tech; the real
       content lives in the #ui layer) -->
  <div id="app" aria-hidden="true"></div>

  <!-- All HTML UI lives above the canvas -->
  <div id="ui"></div>

  <!-- Black fade used for scene transitions -->
  <div id="fade"></div>

  <!-- Cinematic boot / loader -->
  <div id="boot" aria-label="Loading">
    <div class="boot-leader">
      <div class="boot-ring"><div class="boot-sweep"></div></div>
      <div class="boot-count" id="boot-count">3</div>
    </div>
    <div class="boot-log" id="boot-log"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
